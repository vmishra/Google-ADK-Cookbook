site_name: Google ADK Cookbook
site_description: A practitioner's reference for building, orchestrating, and shipping agents with Google's Agent Development Kit.
site_author: Vikas Mishra
site_url: https://vmishra.github.io/Google-ADK-Cookbook/
repo_url: https://github.com/vmishra/Google-ADK-Cookbook
repo_name: vmishra/Google-ADK-Cookbook
copyright: >-
  Google ADK Cookbook · Vikas Mishra · Apache&nbsp;2.0

docs_dir: docs

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark
  font: false
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    admonition:
      note: material/circle-medium
      tip: material/circle-medium
      warning: material/triangle-small-up
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¶"
      permalink_title: Anchor
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/mermaid-init.js

extra_css:
  - https://rsms.me/inter/inter.css
  - assets/fonts.css
  - assets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vmishra/Google-ADK-Cookbook
      name: Source on GitHub

